<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=800, height=480, initial-scale=1, user-scalable=no" />
  <title>Ben 10 Omnitrix — Alien Database</title>
  <style>
    :root{
      --bg:#050508;--green:#00E676;--blue:#2979FF;--red:#FF1744;
      --yellow:#FFD600;--purple:#D500F9;--orange:#FF9100;--cyan:#00E5FF;--white:#FFF;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:800px;height:480px;overflow:hidden;background:var(--bg);color:var(--white);
      font-family:Arial,Helvetica,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
    .page{width:800px;height:480px;padding:12px 18px;display:flex;flex-direction:column}
    .hdr{display:flex;align-items:center;justify-content:space-between;height:38px;flex-shrink:0}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .badge{background:var(--green);color:#000;font-weight:900;padding:3px 10px;letter-spacing:2px;font-size:12px}
    .ttl{font-size:19px;font-weight:900;letter-spacing:1px}
    .ttl .b10{color:var(--green)}.ttl .sub{color:var(--white)}
    .clock{font-size:11px;color:var(--blue);font-weight:700;text-align:right;line-height:1.2}
    .clock .t{color:var(--white);font-size:17px}

    .main{display:flex;flex:1;gap:14px;margin-top:8px;min-height:0}
    .img-col{width:260px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
      border:2px solid var(--green);background:#0a0a12;position:relative;overflow:hidden}
    .img-col img{max-width:240px;max-height:360px;object-fit:contain;z-index:1;display:none}
    .img-col img.loaded{display:block}
    .ring1{position:absolute;width:250px;height:250px;border-radius:50%;
      border:2px dashed rgba(255,255,255,.12);animation:spin 20s linear infinite}
    .ring2{position:absolute;width:200px;height:200px;border-radius:50%;
      border:2px dashed rgba(255,255,255,.08);animation:spin 15s linear infinite reverse}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .portrait{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:75px;position:relative;z-index:1;transition:all .3s}
    .portrait.hidden{display:none}
    .refresh-btn{position:absolute;bottom:6px;right:10px;background:var(--green);color:#000;border:none;
      padding:3px 12px;font-size:10px;font-weight:900;letter-spacing:2px;cursor:pointer;z-index:3}
    .refresh-btn:hover{background:#00ff88}
    .idx-badge{position:absolute;top:6px;right:8px;font-size:10px;color:var(--green);
      font-weight:900;letter-spacing:2px;z-index:3}

    .info-col{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
    .name-row{display:flex;align-items:baseline;gap:8px}
    .alien-name{font-size:30px;font-weight:900;letter-spacing:2px}
    .alien-num{font-size:12px;color:#555;letter-spacing:3px}
    .species-row{font-size:13px;color:var(--yellow);letter-spacing:1px;font-weight:700}
    .spec-label{color:#555;font-weight:400}
    .planet-row{font-size:11px;color:#777;letter-spacing:1px}
    .powers-title{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
    .powers-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
    .power-tag{padding:4px 8px;font-size:10px;font-weight:700;letter-spacing:1px;
      border:2px solid var(--green);color:var(--green)}
    .power-tag:nth-child(1){border-color:#00E676;color:#00E676}
    .power-tag:nth-child(2){border-color:#FFD600;color:#FFD600}
    .power-tag:nth-child(3){border-color:#FF1744;color:#FF1744}
    .power-tag:nth-child(4){border-color:#2979FF;color:#2979FF}
    .power-tag:nth-child(5){border-color:#D500F9;color:#D500F9}
    .power-tag:nth-child(6){border-color:#FF9100;color:#FF9100}
    .series-bar{display:flex;align-items:center;gap:10px;margin-top:auto}
    .series-pill{font-size:10px;font-weight:900;padding:4px 12px;letter-spacing:2px;color:#000}
    .series-pill.og{background:var(--green)}.series-pill.af{background:var(--yellow)}
    .series-pill.ov{background:var(--purple);color:#fff}
    .desc{font-size:10px;color:#999;letter-spacing:.3px;line-height:1.4}
    .ftr{height:28px;flex-shrink:0;background:var(--green);color:#000;display:flex;
      align-items:center;justify-content:space-between;padding:0 18px;font-size:10px;
      font-weight:900;letter-spacing:1px;margin:0 -18px -12px -18px}
  </style>
</head>
<body>
<div class="page" id="page">
  <div class="hdr">
    <div class="hdr-left">
      <div class="badge">OMNITRIX</div>
      <div class="ttl"><span class="b10">BEN 10</span> <span class="sub">&middot; ALIEN DATABASE</span></div>
    </div>
    <div class="clock">
      <div class="t" id="clock">--:--</div>
      <div id="date">---</div>
    </div>
  </div>
  <div class="main">
    <div class="img-col" id="imgCol">
      <div class="ring1"></div><div class="ring2"></div>
      <img id="alienImg" src="" alt="" />
      <div class="portrait" id="portrait"><span id="emoji">🔥</span></div>
      <button class="refresh-btn" onclick="nextAlien()">NEXT &#9654;</button>
      <div class="idx-badge" id="idxBadge">01/24</div>
    </div>
    <div class="info-col">
      <div>
        <div class="name-row"><span class="alien-name" id="aName">--</span><span class="alien-num" id="aNum">#--</span></div>
        <div class="species-row"><span class="spec-label">SPECIES: </span><span id="aSpecies">--</span></div>
        <div class="planet-row">HOME PLANET: <span id="aPlanet">--</span></div>
      </div>
      <div><div class="powers-title">POWERS & ABILITIES</div><div class="powers-grid" id="powersGrid"></div></div>
      <div class="desc" id="aDesc"></div>
      <div class="series-bar"><span class="series-pill" id="seriesPill">ORIGINAL</span><span style="font-size:10px;color:#777" id="hint">Click anywhere for next alien</span></div>
    </div>
  </div>
  <div class="ftr"><div>BEN TENNYSON OMNITRIX DATABASE</div><div id="status">ACTIVE</div><div id="updated">UPDATED: ---</div></div>
</div>
<script>
(function(){
  var A=[
    {no:1,name:"Heatblast",  species:"Pyronite",     planet:"Pyros",
     powers:["Pyrokinesis","Fire Body","Lava Surfing","Supernova"],
     desc:"A living furnace of molten rock and fire. Heatblast hurls fireballs, surfs on flames, withstands any temperature. Ben's most iconic alien — the first transformation he ever made.",
     emoji:"🔥",clr:"#FF3D00,#FF9100",s:"og"},
    {no:2,name:"Four Arms",  species:"Tetramand",    planet:"Khoros",
     powers:["Super Strength","Four Arms","Shockwave Clap","Grappling"],
     desc:"A towering red-skinned warrior with four muscular arms. Creates sonic booms with his thunderous clap. Punches through steel and wrestles tanks into submission.",
     emoji:"💪",clr:"#D50000,#880000",s:"og"},
    {no:3,name:"Diamondhead",species:"Petrosapien",  planet:"Petropia",
     powers:["Crystal Body","Projectiles","Regeneration","Blades"],
     desc:"Living diamond that morphs his arms into blades. Fires crystal shards at supersonic speeds, deflects energy beams effortlessly. Harder than any known material.",
     emoji:"💎",clr:"#00E5FF,#006064",s:"og"},
    {no:4,name:"XLR8",       species:"Kineceleran",  planet:"Kinet",
     powers:["Super Speed","Wall Running","Tornadoes","Rapid Strikes"],
     desc:"Velocity personified — moves so fast the world appears frozen. Runs on water and up walls. His helmet visor protects him at supersonic speeds.",
     emoji:"💨",clr:"#2979FF,#0D47A1",s:"og"},
    {no:5,name:"Grey Matter",species:"Galvan",       planet:"Galvan Prime",
     powers:["Super Intelligence","Small Size","Tech Mastery","Hacking"],
     desc:"A tiny amphibian genius who understands any machine at a glance. Crawls through tight spaces and outthinks enemies 100 times his size. The brains of the Omnitrix.",
     emoji:"🧠",clr:"#BDBDBD,#616161",s:"og"},
    {no:6,name:"Wildmutt",   species:"Vulpimancer",  planet:"Vulpin",
     powers:["Enhanced Senses","Tracking","Quill Fire","Night Vision"],
     desc:"A blind beast that sees through smell and hearing. A relentless tracker who fires quills from his back. Navigates any terrain by instinct alone.",
     emoji:"🐺",clr:"#FF6D00,#BF360C",s:"og"},
    {no:7,name:"Upgrade",    species:"Mechamorph",   planet:"Galvan B",
     powers:["Tech Fusion","Laser Beams","Shapeshifting","Upgrading"],
     desc:"Living nanotech that merges with any machine and makes it better. A ghost in the machine — controls vehicles, weapons, and computers instantly.",
     emoji:"⚡",clr:"#00E676,#1B5E20",s:"og"},
    {no:8,name:"Ghostfreak", species:"Ectonurite",   planet:"Anur Phaetos",
     powers:["Invisibility","Intangibility","Flight","Possession"],
     desc:"A phantom with a dark secret beneath his second skin. Phases through any wall, turns invisible, possesses living beings. His true form is his greatest weapon.",
     emoji:"👻",clr:"#7C4DFF,#311B92",s:"og"},
    {no:9,name:"Ripjaws",    species:"Piscciss Volann",planet:"Piscciss",
     powers:["Underwater Breathing","Bite Force","Angler Light","Swimming"],
     desc:"Deep-sea predator that crushes steel with his jaws. Swims at incredible speeds. Needs water to survive on land — his one critical weakness.",
     emoji:"🦈",clr:"#18FFFF,#006064",s:"og"},
    {no:10,name:"Stinkfly",  species:"Lepidopterran",planet:"Lepidopterra",
     powers:["Flight","Stink Goo","360 Vision","Sharp Tail"],
     desc:"Giant insectoid with four eyestalks. Sprays sticky, foul-smelling goo that traps enemies and extinguishes fires. Agile flyer, surprisingly fast.",
     emoji:"🪰",clr:"#8BC34A,#33691E",s:"og"},
    {no:11,name:"Swampfire", species:"Methanosian",  planet:"Methanos",
     powers:["Plant Control","Fire Blasts","Regeneration","Mud Portals"],
     desc:"Walking swamp that commands both fire and flora. Regenerates from any wound, teleports through mud. One of Ben's most versatile Powerhouse aliens.",
     emoji:"🌿",clr:"#76FF03,#1B5E20",s:"af"},
    {no:12,name:"Humungousaur",species:"Vaxasaurian",planet:"Terradino",
     powers:["Size Growth","Super Strength","Armor Skin","Thunder Clap"],
     desc:"Dinosaur-like titan that grows over 60 feet tall. Armored hide withstands missiles. Increases size and strength repeatedly in battle — an unstoppable force.",
     emoji:"🦖",clr:"#8D6E63,#3E2723",s:"af"},
    {no:13,name:"Echo Echo", species:"Sonorosian",   planet:"Sonorosia",
     powers:["Sound Blasts","Self-Duplication","Sonic Wall","Cloning"],
     desc:"Living speaker that multiplies with every scream. Creates an army of clones, each unleashing devastating sonic attacks. Overwhelming in numbers.",
     emoji:"🔊",clr:"#E0E0E0,#424242",s:"af"},
    {no:14,name:"Big Chill", species:"Necrofriggian",planet:"Kylmyys",
     powers:["Ice Breath","Intangibility","Flight","Freeze Touch"],
     desc:"Moth-like phantom of absolute cold. Freezes enemies solid mid-attack, phases through walls effortlessly. Graceful and terrifying in equal measure.",
     emoji:"❄️",clr:"#80D8FF,#01579B",s:"af"},
    {no:15,name:"Jetray",    species:"Aerophibian",  planet:"Aeropela",
     powers:["Supersonic Flight","Laser Eyes","Neuroshock","Space Flight"],
     desc:"Manta ray that dominates sky and sea. Flies at supersonic speeds, fires paralyzing neuroshock lasers from eyes and tail. Swims faster than torpedoes.",
     emoji:"🛸",clr:"#FF1744,#B71C1C",s:"af"},
    {no:16,name:"Chromastone",species:"Crystalsapien",planet:"MorOtesi",
     powers:["Energy Absorption","UV Blasts","Light Refraction","Flight"],
     desc:"Living prism that converts any energy into ultraviolet beams. Channels and amplifies attacks. Nearly immune to all energy-based weapons.",
     emoji:"💠",clr:"#D500F9,#4A148C",s:"af"},
    {no:17,name:"Brainstorm",species:"Cerebrocrustacean",planet:"Encephalonus IV",
     powers:["Super Intelligence","Electric Blasts","Telekinesis","Force Fields"],
     desc:"Crab-like super-genius whose brain generates electrical storms. Solves impossible problems in seconds. Zaps enemies with devastating lightning bolts.",
     emoji:"🦀",clr:"#FF6D00,#BF360C",s:"af"},
    {no:18,name:"Spidermonkey",species:"Arachnichimp",planet:"Aranhaschimmia",
     powers:["Web Shooting","Wall Climbing","Tail Grab","Acrobatics"],
     desc:"Part spider, part monkey, all chaos. Swings through cities spraying webs from his tail. Acrobatic flips and sixth sense make him nearly untouchable.",
     emoji:"🕷️",clr:"#2979FF,#0D47A1",s:"af"},
    {no:19,name:"Rath",      species:"Appoplexian",  planet:"Appoplexia",
     powers:["Berserker Rage","Claws","Wrestling","Pain Tolerance"],
     desc:"LEMME TELL YA SOMETHING! Pure unfiltered rage with claws. Charges headfirst, wrestles tanks, never backs down. Equal parts hilarious and terrifying.",
     emoji:"😤",clr:"#FF6D00,#BF360C",s:"af"},
    {no:20,name:"Lodestar",  species:"Biot-savartian",planet:"Unknown",
     powers:["Magnetism","Metal Control","Flight","EMP"],
     desc:"Floating magnetic overlord controlling all metal. Levitates cars, creates force fields, disassembles machines with a thought. The ultimate anti-tech weapon.",
     emoji:"🧲",clr:"#FFD600,#F57F17",s:"af"},
    {no:21,name:"Feedback",  species:"Conductoid",   planet:"Teslavorr Nebula",
     powers:["Energy Absorption","Electric Blasts","Cable Tendrils","Conduction"],
     desc:"Living power cable. Absorbs any energy attack and fires it back stronger. Antenna tendrils plug into any source. Ben's all-time personal favorite alien.",
     emoji:"🔌",clr:"#212121,#000000",s:"ov"},
    {no:22,name:"Bloxx",     species:"Segmentasapien",planet:"Polyominus",
     powers:["LEGO Body","Shapeshifting","Barrier Walls","Regeneration"],
     desc:"Gorilla of interlocking building blocks. Reshapes body into walls, catapults, or projectiles. Rebuilds himself mid-battle — as durable as he is creative.",
     emoji:"🧱",clr:"#FF6D00,#BF360C",s:"ov"},
    {no:23,name:"Gravattack",species:"Galilean",     planet:"Keplorr",
     powers:["Gravity Control","Orbit Creation","Planetary Body","Black Hole"],
     desc:"Living planetoid that bends gravity to his will. Makes enemies weightless or crushes them under immense pressure. His orbit attack is literally world-ending.",
     emoji:"🪐",clr:"#8D6E63,#3E2723",s:"ov"},
    {no:24,name:"Atomix",    species:"Unknown",      planet:"Unknown",
     powers:["Nuclear Energy","Fusion Punch","Radiation Blasts","Meltdown"],
     desc:"Walking nuclear reactor. Ben's second most powerful alien ever. Fusion-powered punches vaporize targets. His radiation aura melts surroundings passively.",
     emoji:"☢️",clr:"#76FF03,#1B5E20",s:"ov"}
  ];

  var REFRESH=5000, idx=Math.floor(Math.random()*A.length), timer;

  function clk(){
    var n=new Date();
    document.getElementById("clock").textContent=n.toLocaleTimeString("en-US",{hour12:true,hour:"2-digit",minute:"2-digit"});
    document.getElementById("date").textContent=n.toLocaleDateString("en-US",{weekday:"short",day:"numeric",month:"short"});
  }
  clk();setInterval(clk,1000);

  function next(){idx=(idx+1)%A.length;render();reset();}
  function prev(){idx=(idx-1+A.length)%A.length;render();reset();}
  function reset(){clearInterval(timer);timer=setInterval(next,REFRESH);}

  function render(){
    var a=A[idx];
    var sc=a.s==="og"?"var(--green)":a.s==="af"?"var(--yellow)":"var(--purple)";
    var scv=a.s==="og"?"#00E676":a.s==="af"?"#FFD600":"#D500F9";

    // Try loading image
    var img=document.getElementById("alienImg");
    var em=document.getElementById("portrait");
    img.classList.remove("loaded");
    img.src="ben10_images/"+String(a.no).padStart(2,"0")+".png";
    img.onload=function(){img.classList.add("loaded");em.classList.add("hidden");};
    img.onerror=function(){em.classList.remove("hidden");img.classList.remove("loaded");};

    // Portrait fallback
    document.getElementById("emoji").textContent=a.emoji;
    em.style.background="radial-gradient(circle,"+a.clr+")";
    em.style.boxShadow="0 0 50px "+scv;

    // Border
    document.getElementById("imgCol").style.borderColor=scv;

    // Info
    document.getElementById("aName").textContent=a.name;
    document.getElementById("aName").style.color=scv;
    document.getElementById("aNum").textContent="#"+String(a.no).padStart(2,"0");
    document.getElementById("aSpecies").textContent=a.species;
    document.getElementById("aPlanet").textContent=a.planet;
    document.getElementById("aDesc").textContent=a.desc;
    document.getElementById("idxBadge").textContent=String(a.no).padStart(2,"0")+"/"+A.length;

    // Powers
    var pg=document.getElementById("powersGrid");pg.innerHTML="";
    a.powers.forEach(function(p){
      var t=document.createElement("span");t.className="power-tag";t.textContent=p;pg.appendChild(t);
    });

    // Series
    var sp=document.getElementById("seriesPill");
    sp.className="series-pill "+a.s;
    sp.textContent=a.s==="og"?"ORIGINAL SERIES":a.s==="af"?"ALIEN FORCE":"OMNIVERSE";

    document.getElementById("updated").textContent="UPDATED: "+new Date().toLocaleTimeString("en-US",{hour12:true});
    document.getElementById("hint").textContent="Click anywhere for next alien";
  }

  document.getElementById("page").addEventListener("click",function(e){
    if(e.target.tagName==="BUTTON")return;next();
  });
  document.addEventListener("keydown",function(e){
    if(e.key===" "||e.key==="ArrowRight"){e.preventDefault();next();}
    if(e.key==="ArrowLeft"){e.preventDefault();prev();}
  });

  render();reset();
})();
</script>
</body>
</html>
